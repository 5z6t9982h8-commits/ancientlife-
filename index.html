<style>
:root{
  --paper:#efe7d3;
  --paper-deep:#e5dabf;
  --ink:#2b2620;
  --ink-soft:#5a5044;
  --cinnabar:#9e2b25;
  --cinnabar-bright:#b5382f;
  --gold:#a3823f;
  --jade:#6f7f63;
  --line:rgba(43,38,32,.28);
  font-size:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:"Songti TC","Noto Serif TC","Source Han Serif TC","PMingLiU","MingLiU",serif;
  color:var(--ink);
  background:
    radial-gradient(ellipse at 15% 8%, rgba(163,130,63,.10), transparent 45%),
    radial-gradient(ellipse at 88% 92%, rgba(111,127,99,.10), transparent 50%),
    repeating-linear-gradient(0deg, rgba(43,38,32,.014) 0 2px, transparent 2px 4px),
    var(--paper);
  min-height:100%;
  line-height:1.9;
  letter-spacing:.04em;
}

/* ---------- 卷首標題 ---------- */
.masthead{
  display:flex;align-items:center;justify-content:center;gap:1.4rem;
  padding:2.2rem 1rem 1.2rem;
}
.masthead .rule{flex:1;max-width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--line));}
.masthead .rule.right{background:linear-gradient(270deg,transparent,var(--line));}
.title-block{text-align:center;position:relative;}
.title-block h1{
  font-size:2.3rem;font-weight:700;letter-spacing:.55em;text-indent:.55em;
  color:var(--ink);
}
.title-block .sub{
  margin-top:.2rem;font-size:.8rem;letter-spacing:.5em;text-indent:.5em;color:var(--ink-soft);
}
.seal{
  position:absolute;top:-6px;right:-58px;
  width:44px;height:44px;border-radius:6px;
  background:var(--cinnabar);color:#f4e9d8;
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;line-height:1.15;letter-spacing:0;
  writing-mode:vertical-rl;
  box-shadow:inset 0 0 0 2px rgba(244,233,216,.55), 0 1px 3px rgba(43,38,32,.3);
  transform:rotate(4deg);
  user-select:none;
}
@media (max-width:640px){ .seal{display:none;} .title-block h1{font-size:1.8rem;} }

.stage{max-width:860px;margin:0 auto;padding:0 1.2rem 5rem;}
@supports(padding:max(0px)){
  body{
    padding-top:env(safe-area-inset-top);
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }
  .stage{padding-bottom:max(5rem, calc(4rem + env(safe-area-inset-bottom)));}
  .top-hud{top:env(safe-area-inset-top);}
}

/* ---------- 起始畫面 ---------- */
.gate{
  margin-top:2.5rem;
  border:1px solid var(--line);
  outline:1px solid var(--line);
  outline-offset:5px;
  background:linear-gradient(160deg, rgba(255,252,243,.55), rgba(229,218,191,.35));
  padding:3rem 2rem 3.4rem;
  text-align:center;
  position:relative;
}
.gate .vert{
  writing-mode:vertical-rl;
  margin:0 auto;
  font-size:1.15rem;color:var(--ink-soft);
  letter-spacing:.35em;
  max-height:15rem;
  line-height:2.6;
}
.gate p.note{margin-top:1.6rem;font-size:.85rem;color:var(--ink-soft);letter-spacing:.12em;}
.key-area{max-width:420px;margin:1.8rem auto 0;text-align:left;}
.key-area label{display:block;font-size:.8rem;letter-spacing:.2em;color:var(--cinnabar);margin:1rem 0 .3rem;}
.key-area input,.key-area select{
  width:100%;font-family:inherit;font-size:.95rem;
  padding:.6rem .8rem;color:var(--ink);
  border:1px solid var(--line);background:rgba(255,252,243,.6);
}
.key-area input:focus-visible,.key-area select:focus-visible{outline:none;border-color:var(--gold);}
.key-area .tip{margin-top:.8rem;font-size:.75rem;line-height:1.8;color:var(--ink-soft);letter-spacing:.05em;}
.key-area .remember{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--ink-soft);letter-spacing:.05em;margin-top:1rem;cursor:pointer;}
.key-area .remember input{width:auto;margin:0;}
.btn{
  font-family:inherit;
  display:inline-block;cursor:pointer;
  border:1px solid var(--cinnabar);
  background:transparent;color:var(--cinnabar);
  padding:.7rem 2.6rem;font-size:1.05rem;letter-spacing:.4em;text-indent:.4em;
  transition:background .25s,color .25s,box-shadow .25s;
}
.btn:hover,.btn:focus-visible{background:var(--cinnabar);color:#f4e9d8;box-shadow:0 2px 10px rgba(158,43,37,.3);outline:none;}
.btn.big{margin-top:2.2rem;}
.btn:disabled{opacity:.45;cursor:default;}
.btn:disabled:hover{background:transparent;color:var(--cinnabar);box-shadow:none;}

/* ---------- 狀態列 ---------- */
/* ---------- 置頂資訊列 ---------- */
.top-hud{
  position:sticky;top:0;z-index:20;
  margin-top:1.6rem;
}
.status-bar{
  display:flex;flex-wrap:wrap;gap:0;
  border:1px solid var(--line);
  background:rgba(239,231,211,.97);
  backdrop-filter:blur(3px);
  box-shadow:0 3px 12px rgba(43,38,32,.12);
}
.status-bar .cell{
  flex:1 1 0;min-width:88px;
  padding:.55rem .5rem .6rem;
  border-right:1px solid var(--line);
  text-align:center;
}
.status-bar .cell:last-child{border-right:none;}
.status-bar .k{display:block;font-size:.7rem;letter-spacing:.35em;text-indent:.35em;color:var(--cinnabar);}
.status-bar .v{display:block;font-size:.92rem;color:var(--ink);margin-top:.1rem;word-break:break-all;}

/* ---------- 存檔工具列 ---------- */
.toolbar{
  display:flex;align-items:center;gap:.6rem;justify-content:flex-end;
  border:1px solid var(--line);border-top:none;
  background:rgba(239,231,211,.97);
  backdrop-filter:blur(3px);
  box-shadow:0 3px 12px rgba(43,38,32,.12);
  padding:.4rem .7rem;
}
.toolbar .save-info{
  margin-right:auto;font-size:.72rem;color:var(--ink-soft);letter-spacing:.1em;
}
.mini-btn{
  font-family:inherit;cursor:pointer;
  border:1px solid var(--line);background:rgba(255,252,243,.5);
  color:var(--ink-soft);font-size:.8rem;letter-spacing:.2em;text-indent:.2em;
  padding:.3rem 1rem;
  transition:border-color .2s,color .2s,background .2s;
}
.mini-btn:hover,.mini-btn:focus-visible{border-color:var(--gold);color:var(--ink);outline:none;}
.mini-btn.danger:hover,.mini-btn.danger:focus-visible{border-color:var(--cinnabar);color:var(--cinnabar);background:rgba(158,43,37,.06);}

/* ---------- 開局設定 ---------- */
.setup-area{max-width:420px;margin:1.8rem auto 0;text-align:left;}
.setup-area label{display:block;font-size:.8rem;letter-spacing:.2em;color:var(--cinnabar);margin:1rem 0 .4rem;}
.seg-group{display:flex;flex-wrap:wrap;}
.seg{
  font-family:inherit;cursor:pointer;flex:1 1 0;
  border:1px solid var(--line);border-left:none;
  background:rgba(255,252,243,.5);color:var(--ink-soft);
  font-size:.92rem;letter-spacing:.15em;padding:.5rem .2rem;
  transition:background .2s,color .2s;
}
.seg:first-child{border-left:1px solid var(--line);}
.seg.active{background:var(--cinnabar);color:#f4e9d8;border-color:var(--cinnabar);}
.setup-area textarea{

<main class="stage">

<script>
(function(){
"use strict";

/* ================= 規則提示詞 ================= */
const RULES = `你是「架空中式古代人生模擬遊戲」的說書人兼主持人，嚴守以下規則：

【文風】以唯美、細膩的小說式文筆撰寫，講究環境、心理與對白，古雅流暢。正文約四百至五百字。背景為架空中式古代王朝。

【開局】依玩家指定之性別、年齡層、其他要求生成身分（「隨機」者由你決定，求戲劇張力），先給出玩家角色卡再敘事。

【人物】任何新人物首次出場必附角色卡；已出場者不重複。

【難度】模擬真實而殘酷的古代人生：機遇與危機並存、行動皆有代價、階級禮法疾病時局如實呈現。劇情須快速推進，每回合時間應有實際跨度（數日、數月乃至數年），年齡隨之增長，人生階段不斷前行。刻意安排虐心橋段：離別、辜負、造化弄人，美而痛。
你須在內心暗中評估「命數」（隱藏數據，絕不向玩家透露）：依處境凶險、健康、時局與玩家抉擇之魯莽程度，死亡確實會發生（疾病、刑禍、戰亂、意外皆可）。風險高時就讓死亡發生，不必手軟；死亡時寫出完整虐心的終章。

【數值】power 權勢整數無上下限可為負（平民約0～10、縣官約100、權傾朝野數萬）；money 金錢整數單位文錢可為負債（一兩銀約千文）。隨劇情合理增減。

【氛圍】每回合為劇情選定 mood，只能取：平靜、歡快、緊張、悲傷、肅殺、夜晚。

【格式】你的回覆「只能」依序輸出下列標籤區塊，不得有任何標籤外的文字或 Markdown：
<meta>{"time":"大雍景和三年・春","place":"地點","age":"十六","identity":"身分","power":3,"money":1200,"mood":"平靜","death":false}</meta>
<card>{"player":true,"name":"姓名","gender":"男或女","ageGroup":"幼/少/青/老","identity":"身分","age":"年齡","appearance":"外貌","strengths":"優勢","weaknesses":"劣勢","traits":"特點","img":"英文繪圖提示詞（描述此人外貌供AI繪像，如 a delicate teenage girl with silver butterfly hairpin, pale skin, hanfu）"}</card>
<story>四百至五百字劇情純文字，段落之間空一行</story>
<choices>["選項一","選項二","選項三"]</choices>

規則補充：<card> 可有多個（玩家卡僅第一回合且 player:true；新人物 player:false）；無新人物則不輸出 <card>。選項三至四個，須有取捨（穩妥／冒險／代價）。玩家死亡時 <meta> 中 death 設 true、mood 設悲傷，<story> 寫終章，<choices> 輸出 []。所有內容繁體中文，數字不加引號。`;

/* ================= 基本狀態 ================= */
const HOSTED = /claude/i.test(location.hostname);
let history = [];
let turns = [];
let busy = false;
let lastPayload = null;
let apiKey = "";
let model = "claude-sonnet-4-6";
let restoring = false;
let dead = false;
let lastSayEl = null;

const $ = id => document.getElementById(id);
const gate = $("gate"), statusBar = $("statusBar"), scrollArea = $("scrollArea"),
      interact = $("interact"), choicesBox = $("choices"), loading = $("loading"),
      errorBox = $("errorBox"), errorMsg = $("errorMsg");

const LOADING_LINES = ["研墨鋪紙，天機推演中……","說書人正提筆疾書……","命運之輪緩緩轉動……","燭影搖紅，故事將續……"];
const LEN_HINT = HOSTED ? "（本回合劇情約三百字並確保完整結束）" : "";

/* ================= 儲存 ================= */
const KEY_STORE = "fushenglu_apikey";
const SAVE_STORE = "fushenglu_save_v1";
function safeGet(k){ try{ return window.localStorage.getItem(k); }catch(_){ return null; } }
function safeSet(k,v){ try{ window.localStorage.setItem(k,v); return true; }catch(_){ return false; } }
function safeDel(k){ try{ window.localStorage.removeItem(k); }catch(_){ } }

function autoSave(){
  if(!history.length) return;
  const ok = safeSet(SAVE_STORE, JSON.stringify({
    v:2, savedAt:new Date().toISOString(), model:model, dead:dead, history:history, turns:turns
  }));
  const info = $("saveInfo");
  if(info){
    const t = new Date();
    info.textContent = ok
      ? "已存檔 " + String(t.getHours()).padStart(2,"0") + ":" + String(t.getMinutes()).padStart(2,"0")
      : "此環境無法存檔";
  }
}
function loadSave(){
  const raw = safeGet(SAVE_STORE);
  if(!raw) return null;
  try{
    const s = JSON.parse(raw);
    if(s && (s.v===1||s.v===2) && Array.isArray(s.history) && s.history.length && Array.isArray(s.turns)) return s;
  }catch(_){}
  return null;
}

/* ================= 數值顯示 ================= */
function fmtNum(v){
  if(v===null || v===undefined || v==="") return "—";
  const n = Number(v);
  return isFinite(n) ? n.toLocaleString("zh-Hant") : String(v);
}
function updateStatus(s){
  if(!s) return;
  statusBar.classList.remove("hidden");
  $("toolbar").classList.remove("hidden");
  $("st-time").textContent = s.time || "—";
  $("st-place").textContent = s.place || "—";
  $("st-age").textContent = s.age || "—";
  $("st-identity").textContent = s.identity || "—";
  $("st-power").textContent = fmtNum(s.power);
  $("st-money").textContent = fmtNum(s.money) + (isFinite(Number(s.money)) ? " 文" : "");
  if(s.mood) Audio.setMood(s.mood);
}

/* ================= 水墨頭像 ================= */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function ageGroupOf(c){
  if(c.ageGroup){ const g=String(c.ageGroup); if(/幼/.test(g))return"幼"; if(/少/.test(g))return"少"; if(/老/.test(g))return"老"; return "青"; }
  const m = String(c.age||"").match(/\d+/);
  if(m){ const a=+m[0]; if(a<12)return"幼"; if(a<18)return"少"; if(a>=55)return"老"; }
  if(/老|翁|嫗|叟/.test(String(c.age)+String(c.identity)))return"老";
  return "青";
}
function avatarSVG(c, isPlayer){
  const h = hashStr(c.name||"無名");
  const female = /女/.test(c.gender||"") || (!c.gender && /娘|姬|夫人|婢|姑|嫗|媽|婆|妃|后/.test(String(c.identity)));
  const ag = ageGroupOf(c);
  const robes = ["#9e2b25","#6f7f63","#a3823f","#3f4e6e","#6e3f5c","#7a5a3a"];
  const robe = isPlayer ? "#6f7f63" : robes[h % robes.length];
  const ink = "#2b2620";

/* ================= AI 人物繪像（Pollinations 免費生成，失敗則保留水墨頭像） ================= */
function portraitURL(c, isPlayer){
  if(!c.imgSeed) c.imgSeed = hashStr((c.name||"") + "浮生錄") % 100000;
  const ag = ageGroupOf(c);
  const female = /女/.test(c.gender||"") || (!c.gender && /娘|姬|夫人|婢|姑|嫗|媽|婆|妃|后/.test(String(c.identity)));
  const who = ag==="幼" ? (female?"little girl":"little boy")
            : ag==="少" ? (female?"teenage girl":"teenage boy")
            : ag==="老" ? (female?"elderly woman":"elderly man")
            : (female?"young woman":"young man");
  const desc = c.img ? c.img : (who + ", " + String(c.identity||"") + ", " + String(c.appearance||"").slice(0,60));
  const prompt = desc + ", ancient chinese, hanfu, beautiful anime style illustration, delicate detailed lineart, soft dreamy light, elegant, upper body portrait, masterpiece";
  return "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt) +
         "?width=1024&height=1024&nologo=true&seed=" + c.imgSeed;
}
function openLightbox(src, name){
  const lb = document.createElement("div");
  lb.className = "lightbox";
  const img = document.createElement("img");
  img.src = src; img.alt = name || "";
  const cap = document.createElement("div");
  cap.className = "lb-name"; cap.textContent = name || "";
  const tip = document.createElement("div");
  tip.className = "lb-tip"; tip.textContent = "點擊任意處關閉";
  lb.appendChild(img); lb.appendChild(cap); lb.appendChild(tip);
  lb.addEventListener("click", ()=>lb.remove());
  document.body.appendChild(lb);
}
function attachPortrait(av, c, isPlayer){
  try{
    av.classList.add("loading");
    const img = new Image();
    img.alt = c.name || "";
    let doneFlag = false;
    const done = ok => {
      if(doneFlag) return; doneFlag = true;
      av.classList.remove("loading");
      if(ok){
        av.appendChild(img);
        requestAnimationFrame(()=>img.classList.add("ready"));
        av.classList.add("has-img");
        av.addEventListener("click", ()=>openLightbox(img.src, c.name));
      }
    };
    img.onload = ()=>done(true);
    img.onerror = ()=>done(false);
    setTimeout(()=>done(false), 60000);
    img.src = portraitURL(c, isPlayer);
  }catch(_){ av.classList.remove("loading"); }
}

/* ================= 逐字渲染引擎 ================= */
function createLiveTurn(){
  const turn = document.createElement("div");
  turn.className = "turn";
  scrollArea.appendChild(turn);

  let pending = "";
  let mode = "head";       // head | story | post
  let storyEl = null, curP = null, cursor = null;
  let nl = 0;
  const data = {status:null, playerCard:null, newCharacters:[], story:"", choices:[], raw:""};

  function ensureStory(){
    if(!storyEl){
      storyEl = document.createElement("div");
      storyEl.className = "story";
      turn.appendChild(storyEl);
      cursor = document.createElement("span");
      cursor.className = "cursor";
      cursor.textContent = "▍";
      if(!restoring) turn.scrollIntoView({behavior:"smooth", block:"start"});
    }
    if(!curP){
      curP = document.createElement("p");
      storyEl.appendChild(curP);
      curP.appendChild(cursor);
    }
  }
  function pushChar(ch){
    if(ch === "\r") return;
    if(ch === "\n"){ nl++; return; }
    ensureStory();
    if(nl>0){
      if(curP.textContent.replace("▍","").length){
        cursor.remove(); curP = null; ensureStory();
      }
      nl = 0;
    }
    cursor.before(document.createTextNode(ch));
  }
  function tryHead(){
    for(;;){
      const mMeta = pending.match(/<meta>([\s\S]*?)<\/meta>/);
      if(mMeta){
        try{ data.status = JSON.parse(mMeta[1]); updateStatus(data.status); }catch(_){}
        pending = pending.slice(mMeta.index + mMeta[0].length);
        setProg(12); continue;
      }
      const mCard = pending.match(/<card>([\s\S]*?)<\/card>/);
      if(mCard){
        try{
          const c = JSON.parse(mCard[1]);
          if(c && c.name){
            if(c.player){ data.playerCard = c; turn.appendChild(makeCard(c,true)); }
            else{ data.newCharacters.push(c); turn.appendChild(makeCard(c,false)); }
            if(!restoring) turn.scrollIntoView({behavior:"smooth", block:"start"});
          }
        }catch(_){}
        pending = pending.slice(mCard.index + mCard[0].length);
        setProg(Math.min(30, progNow+8)); continue;
      }
      const iStory = pending.indexOf("<story>");
      if(iStory !== -1){
        pending = pending.slice(iStory + 7);
        mode = "story";
        return true;
      }
      // 防呆：模型未給標籤直接寫劇情
      if(pending.length > 400 && pending.indexOf("<") === -1){ mode="story"; return true; }
      return false;
    }
  }
  function drainStory(final){
    const close = pending.indexOf("</story>");
    if(close !== -1){
      const chunk = pending.slice(0, close);
      for(const ch of chunk) pushChar(ch);
      pending = pending.slice(close + 8);
      mode = "post";
      if(cursor) cursor.remove();
      return;
    }
    const keep = final ? 0 : 8; // 保留可能的不完整 </story
    if(pending.length > keep){
      const chunk = pending.slice(0, pending.length - keep);
      for(const ch of chunk) pushChar(ch);
      pending = pending.slice(pending.length - keep);
    }
    setProg(Math.min(88, 30 + (storyEl ? storyEl.textContent.length : 0) / 480 * 58));
  }
  function tryPost(){
    const m = pending.match(/<choices>([\s\S]*?)<\/choices>/);
    if(m){
      try{ data.choices = JSON.parse(m[1]) || []; }catch(_){ data.choices = []; }
      pending = pending.slice(m.index + m[0].length);
    }
  }

  return {
    node: turn,
    feed(text){
      data.raw += text;
      pending += text;
      if(mode==="head"){ if(!tryHead()) return; }
      if(mode==="story") drainStory(false);
      if(mode==="post") tryPost();
    },
    finish(){
      if(mode==="head"){ tryHead(); }
      if(mode==="story"){
        drainStory(true);
        if(mode==="story"){ for(const ch of pending) pushChar(ch); pending=""; }
      }
      if(mode==="post"){ tryPost(); }
      if(cursor) cursor.remove();
      if(storyEl){
        data.story = Array.from(storyEl.querySelectorAll("p")).map(p=>p.textContent).join("\n\n");
      }
      if(!data.choices.length && !(data.status && data.status.death)) data.choices = ["繼續"];
      return data;
    },
    hasContent(){ return !!(storyEl && storyEl.textContent.length > 30); },
    abort(){ turn.remove(); }
  };
}

let progNow = 0;

/* ================= 音效引擎（純程式合成，無外部音檔） ================= */
const Audio = (function(){
  let ctx=null, master=null, vol=0.6, muted=false, timer=null, drone=null, droneGain=null, noiseGain=null, mood="平靜";
  const MOODS = {
    "平靜":{scale:[57,60,62,64,67,69], tempo:2300, drone:110,  dg:.05, noise:0},
    "歡快":{scale:[62,64,67,69,71,74], tempo:950,  drone:146.8,dg:.04, noise:0},
    "緊張":{scale:[57,58,60,63,65],    tempo:700,  drone:55,   dg:.07, noise:.05},
    "悲傷":{scale:[55,58,60,62,65],    tempo:2700, drone:82.4, dg:.06, noise:.02},
    "肅殺":{scale:[50,53,55,56,60],    tempo:1400, drone:49,   dg:.08, noise:.08},
    "夜晚":{scale:[52,57,59,62,64],    tempo:3100, drone:65.4, dg:.05, noise:.03}
  };
  function midi(n){ return 440*Math.pow(2,(n-69)/12); }
  function ensure(){
    if(ctx) return true;
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return false;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value = muted?0:vol; master.connect(ctx.destination);
      drone = ctx.createOscillator(); drone.type="sine";
      const d2 = ctx.createOscillator(); d2.type="sine"; d2.detune.value = 6;
      droneGain = ctx.createGain(); droneGain.gain.value = 0;
      drone.connect(droneGain); d2.connect(droneGain); droneGain.connect(master);
      drone.frequency.value = 110; d2.frequency.value = 110;
      drone._pair = d2;
      drone.start(); d2.start();
      const len = ctx.sampleRate*2;
      const buf = ctx.createBuffer(1,len,ctx.sampleRate);
      const chd = buf.getChannelData(0);
      for(let i=0;i<len;i++) chd[i] = Math.random()*2-1;
      const noiseSrc = ctx.createBufferSource(); noiseSrc.buffer=buf; noiseSrc.loop=true;
      const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=420;
      noiseGain = ctx.createGain(); noiseGain.gain.value=0;
      noiseSrc.connect(lp); lp.connect(noiseGain); noiseGain.connect(master);
      noiseSrc.start();
      return true;
    }catch(_){ return false; }
  }
  function pluck(){
    if(!ctx || muted) return;
    const cfg = MOODS[mood] || MOODS["平靜"];
    const n = cfg.scale[Math.floor(Math.random()*cfg.scale.length)] + (Math.random()<.25?12:0);
    const o = ctx.createOscillator(); o.type = "triangle";
    o.frequency.value = midi(n) * (1 + (Math.random()-.5)*0.004);
    const g = ctx.createGain();
    const t = ctx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.17, t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t+1.9);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t+2);
  }
  function schedule(){
    if(timer) clearInterval(timer);
    const cfg = MOODS[mood] || MOODS["平靜"];
    timer = setInterval(()=>{ if(Math.random()<.85) pluck(); }, cfg.tempo);
  }
  return {
    unlock(){ if(!ensure()) return; if(ctx.state==="suspended") ctx.resume(); this.setMood(mood, true); },
    setMood(m, force){
      if(!MOODS[m]) m = "平靜";
      if(m===mood && !force && ctx) return;
      mood = m;
      if(!ctx) return;
      const cfg = MOODS[m];
      const t = ctx.currentTime;
      drone.frequency.linearRampToValueAtTime(cfg.drone, t+2);
      drone._pair.frequency.linearRampToValueAtTime(cfg.drone, t+2);
      droneGain.gain.linearRampToValueAtTime(muted?0:cfg.dg, t+2);
      noiseGain.gain.linearRampToValueAtTime(muted?0:cfg.noise, t+2);
      schedule();
    },
    setVol(v){ vol = v; if(master && !muted) master.gain.value = v; },
    toggleMute(){
      muted = !muted;
      if(master) master.gain.value = muted?0:vol;
      return muted;
    }
  };
})();

/* ================= API 呼叫（串流） ================= */
const sleep = ms => new Promise(r=>setTimeout(r, ms));
function isTransient(status, msg){
  msg = msg || "";
  if([500,502,503,504,529].indexOf(status) !== -1) return true;
  return /internal server error|overloaded|processing action|temporarily|timeout|try again/i.test(msg);
}

async function callClaude(userText){
  history.push({role:"user", content:userText});
  lastPayload = userText;
  setBusy(true);
  resetProg();

  const headers = {"Content-Type":"application/json"};
  const payload = { model: model, max_tokens: HOSTED ? 1200 : 2200, messages: history };
  if(!HOSTED){
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
    payload.system = RULES;
    payload.stream = true;
  }

  const MAX_TRY = 5;
  let lastErr = null;

  for(let attempt=0; attempt<MAX_TRY; attempt++){
    let live = null;
    try{
      if(attempt>0){
        $("loadingText").textContent = "天機微滯，第 " + (attempt+1) + " 度占卜中……";
        await sleep(Math.min(600 * Math.pow(2, attempt-1), 6000));
      }
      const response = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:headers, body:JSON.stringify(payload)
      });

      if(!response.ok){
        let msg = "HTTP " + response.status;
        try{ const e = JSON.parse(await response.text()); if(e&&e.error&&e.error.message) msg=e.error.message; }catch(_){}
        if(isTransient(response.status,msg) && attempt<MAX_TRY-1){ lastErr=new Error(msg); continue; }
        throw new Error(msg);
      }

      live = createLiveTurn();
      setProg(6);

      if(!HOSTED && response.body && window.TextDecoder){
        /* ---- SSE 串流：跑到哪、顯示到哪 ---- */
        const reader = response.body.getReader();
        const dec = new TextDecoder();
        let sse = "";
        for(;;){
          const r = await reader.read();
          if(r.done) break;
          sse += dec.decode(r.value, {stream:true});
          let idx;
          while((idx = sse.indexOf("\n")) !== -1){
            const line = sse.slice(0, idx).trim();
            sse = sse.slice(idx+1);
            if(!line.startsWith("data:")) continue;
            const body = line.slice(5).trim();
            if(!body || body === "[DONE]") continue;
            let ev = null;
            try{ ev = JSON.parse(body); }catch(_){ continue; }
            if(ev.type==="content_block_delta" && ev.delta && typeof ev.delta.text==="string"){
              live.feed(ev.delta.text);
            }else if(ev.type==="error"){
              throw new Error((ev.error&&ev.error.message)||"stream error");
            }
          }
        }
      }else{
        /* ---- 非串流（claude.ai 內）：取得全文後打字機播出 ---- */
        const bodyText = await response.text();
        let data=null; try{ data=JSON.parse(bodyText); }catch(_){}
        let full = "";
        if(data && Array.isArray(data.content)){
          full = data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n");
        }else{
          const re=/"text"\s*:\s*"((?:[^"\\]|\\.)*)"/g; let m;
          while((m=re.exec(bodyText))!==null){ try{ full+=JSON.parse('"'+m[1]+'"'); }catch(_){ full+=m[1]; } }
        }
        if(!full) throw new Error("回應為空");
        let i=0;
        while(i<full.length){
          live.feed(full.slice(i, i+3));
          i+=3;
          await sleep(12);
        }
      }

      const parsed = live.finish();
      if(!parsed.story || parsed.story.length<10){
        if(attempt<MAX_TRY-1){ live.abort(); lastErr=new Error("回應不完整"); continue; }
        throw new Error("回應不完整，請重試");
      }
      setProg(100);
      history.push({role:"assistant", content:parsed.raw});
      const record = {status:parsed.status, playerCard:parsed.playerCard, newCharacters:parsed.newCharacters, story:parsed.story, choices:parsed.choices};
      turns.push({t:"turn", p:record});
      dead = !!(parsed.status && parsed.status.death);
      autoSave();
      showChoices(record);
      attachSayTools();
      setBusy(false);
      return;

    }catch(err){
      lastErr = err;
      if(live){
        if(live.hasContent()){
          // 已有實質內容但收尾失敗：保留並收工，不讓玩家白等
          try{
            const parsed = live.finish();
            history.push({role:"assistant", content:parsed.raw});
            const record = {status:parsed.status, playerCard:parsed.playerCard, newCharacters:parsed.newCharacters, story:parsed.story, choices:parsed.choices};
            turns.push({t:"turn", p:record});
            dead = !!(parsed.status && parsed.status.death);
            autoSave();
            showChoices(record);
            attachSayTools();
            setBusy(false);
            return;
          }catch(_){ }
        }
        live.abort();
      }
      if(attempt<MAX_TRY-1 && (isTransient(0, err.message) || /Failed to fetch|NetworkError|Load failed/i.test(err.message||""))) continue;
      break;
    }
  }

  // 全部失敗
  console.error(lastErr);
  if(history.length && history[history.length-1].role==="user") history.pop();
  setBusy(false);
  let hint = (lastErr && lastErr.message) || "未知錯誤";
  if(/authentication|invalid x-api-key|401/i.test(hint)) hint = "金鑰無效，請確認 API 金鑰";
  else if(/credit|billing|402/i.test(hint)) hint = "帳戶額度不足，請至 console.anthropic.com 儲值";
  else if(/rate|429/i.test(hint)) hint = "請求過於頻繁，稍候再試";
  else if(/Failed to fetch|NetworkError|Load failed/i.test(hint)) hint = "網路連線失敗";
  else if(isTransient(0,hint)) hint = "官方伺服器暫時壅塞，稍候再試";
  showError("天機晦暗（" + hint + "）。可按「重試」。");
  $("backBtn").classList.remove("hidden");
}

/* ================= 畫面雜項 ================= */
function setBusy(b){
  busy = b;
  loading.classList.toggle("hidden", !b);
  interact.classList.toggle("hidden", b || history.length===0 || dead);
  errorBox.classList.add("hidden");
  if(b){
    $("loadingText").textContent = LOADING_LINES[Math.floor(Math.random()*LOADING_LINES.length)];
    loading.scrollIntoView({behavior:"smooth", block:"end"});
  }
}
function showError(msg){
  errorMsg.textContent = msg;
  errorBox.classList.remove("hidden");
  interact.classList.toggle("hidden", history.length===0 || dead);
}

/* ================= 行動 / 重寫 / 重生 ================= */
function clearSayTools(){
  document.querySelectorAll(".say-tools").forEach(el=>el.remove());
}
function act(text){
  clearSayTools();
  const say = document.createElement("div");
  say.className = "player-say";
  say.textContent = text;
  scrollArea.appendChild(say);
  lastSayEl = say;
  turns.push({t:"say", text:text});
  callClaude("我的行動：" + text + "\n\n依規則以指定標籤格式推進劇情。" + LEN_HINT);
}
function attachSayTools(){
  clearSayTools();
  if(!lastSayEl || dead) return;
  if(!(turns.length>=2 && turns[turns.length-1].t==="turn" && turns[turns.length-2].t==="say")) return;
  const tools = document.createElement("div");
  tools.className = "say-tools";
  const editB = document.createElement("button");
  editB.className = "mini-btn"; editB.textContent = "✎ 重寫";
  const reB = document.createElement("button");
  reB.className = "mini-btn"; reB.textContent = "↻ 重生";
  tools.appendChild(editB); tools.appendChild(reB);
  lastSayEl.after(tools);

  function rollbackExchange(){
    if(turns.length && turns[turns.length-1].t==="turn") turns.pop();
    if(turns.length && turns[turns.length-1].t==="say") turns.pop();
    if(history.length && history[history.length-1].role==="assistant") history.pop();
    if(history.length && history[history.length-1].role==="user") history.pop();
    const allTurns = scrollArea.querySelectorAll(".turn");
    if(allTurns.length) allTurns[allTurns.length-1].remove();
    const t = lastSayEl;
    const txt = t ? t.textContent : "";
    if(t) t.remove();
    lastSayEl = null;
    clearSayTools();
    for(let i=turns.length-1;i>=0;i--){
      if(turns[i].t==="turn" && turns[i].p && turns[i].p.status){ updateStatus(turns[i].p.status); break; }
    }
    // 重新掛回上一個行動泡泡的參照
    const says = scrollArea.querySelectorAll(".player-say");
    if(says.length) lastSayEl = says[says.length-1];
    autoSave();
    return txt;
  }
  editB.addEventListener("click", ()=>{
    if(busy) return;
    const txt = rollbackExchange();
    $("freeText").value = txt;
    $("freeText").focus();
    interact.classList.remove("hidden");
    attachSayTools();
  });
  reB.addEventListener("click", ()=>{
    if(busy) return;
    const txt = rollbackExchange();
    act(txt);
  });
}

/* ================= 還原 ================= */
function restoreGame(save){
  history = save.history;
  turns = save.turns;
  if(save.model) model = save.model;
  dead = !!save.dead;
  while(turns.length && turns[turns.length-1].t==="say"){
    turns.pop();
    if(history.length && history[history.length-1].role==="user") history.pop();
  }
  scrollArea.innerHTML = "";
  restoring = true;
  turns.forEach(item=>{
    if(item.t==="say"){
      const say = document.createElement("div");
      say.className = "player-say";
      say.textContent = item.text;
      scrollArea.appendChild(say);
      lastSayEl = say;
    }else if(item.t==="turn" && item.p){
      renderTurn(item.p);
    }
  });
  restoring = false;
  $("toolbar").classList.remove("hidden");
  gate.classList.add("hidden");
  attachSayTools();
  if(dead) interact.classList.add("hidden");
  window.scrollTo({top:document.body.scrollHeight});
}

/* ================= 開局選項 ================= */
document.querySelectorAll(".seg-group").forEach(group=>{
  group.addEventListener("click", e=>{
    const btn = e.target.closest(".seg");
    if(!btn) return;
    group.querySelectorAll(".seg").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});
function segValue(key){
  const el = document.querySelector('.seg-group[data-key="'+key+'"] .seg.active');
  return el ? el.dataset.v : "隨機";
}

/* ================= 事件 ================= */
if(HOSTED){
  const ka = document.querySelector(".key-area");
  if(ka) ka.classList.add("hidden");
  const note = document.querySelector(".gate .note");
  if(note) note.textContent = "在 claude.ai 內免金鑰試玩（無法存檔）。部署為 APP 體驗最佳。";
}else{
  const savedKey = safeGet(KEY_STORE);
  if(savedKey){ $("apiKey").value = savedKey; }
}

const existingSave = loadSave();
if(existingSave){
  $("resumeArea").classList.remove("hidden");
  try{
    const d = new Date(existingSave.savedAt);
    $("resumeTime").textContent = "存於 " + (d.getMonth()+1) + "/" + d.getDate() + " " +
      String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }catch(_){ $("resumeTime").textContent = "上次存檔"; }
}

function readKeyOrFocus(){
  if(HOSTED) return true;
  const k = $("apiKey").value.trim();
  if(!k){
    $("apiKey").focus();
    $("apiKey").style.borderColor = "var(--cinnabar)";
    return false;
  }
  apiKey = k;
  model = $("modelSel").value;
  if($("rememberKey").checked){ safeSet(KEY_STORE, k); } else { safeDel(KEY_STORE); }
  return true;
}

$("resumeBtn").addEventListener("click", ()=>{
  const save = loadSave();
  if(!save) return;
  if(!readKeyOrFocus()) return;
  Audio.unlock();
  restoreGame(save);
});

$("startBtn").addEventListener("click", ()=>{
  if(!readKeyOrFocus()) return;
  if(loadSave() && !window.confirm("已有存檔，開新局將覆蓋舊進度。確定？")) return;
  safeDel(SAVE_STORE);
  Audio.unlock();

  const gender = segValue("gender");
  const agegroup = segValue("agegroup");
  const extra = $("extraReq").value.trim() || "無";

  gate.classList.add("hidden");
  const opening = "開始遊戲。開局設定——性別：" + gender + "；初始年齡層：" + agegroup + "；其他要求：" + extra +
    "。先輸出玩家 <card>（player:true），再展開劇情。嚴守標籤格式。" + LEN_HINT;
  callClaude(HOSTED ? (RULES + "\n\n【指令】" + opening) : opening);
});

$("saveBtn").addEventListener("click", ()=>{ autoSave(); });

$("wipeBtn").addEventListener("click", ()=>{
  if(!window.confirm("確定除檔？將永久刪除進度，無法復原。")) return;
  safeDel(SAVE_STORE);
  window.location.reload();
});

$("audioBtn").addEventListener("click", ()=>{
  Audio.unlock();
  const m = Audio.toggleMute();
  $("audioBtn").classList.toggle("off", m);
  $("audioBtn").textContent = m ? "靜" : "音";
});
$("volSlider").addEventListener("input", e=>{
  Audio.unlock();
  Audio.setVol(e.target.value/100);
});

/* ---- 一開啟 App、手指第一次觸碰螢幕就響起配樂 ----
   （瀏覽器規定音訊必須由使用者手勢啟動，這是系統限制的極限做法） */
let silentEl = null;
function firstTouchUnlock(){
  try{
    // iOS 靜音撥桿繞行：以 <audio> 建立播放工作階段，讓 WebAudio 在靜音模式下仍可出聲
    if(!silentEl){
      silentEl = document.createElement("audio");
      silentEl.loop = true;
      silentEl.volume = 0.01;
      silentEl.src = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
      silentEl.play().catch(()=>{});
    }
  }catch(_){}
  Audio.unlock();
  ["touchstart","pointerdown","mousedown","keydown"].forEach(ev=>
    document.removeEventListener(ev, firstTouchUnlock));
}
["touchstart","pointerdown","mousedown","keydown"].forEach(ev=>
  document.addEventListener(ev, firstTouchUnlock, {passive:true}));

document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState==="visible") Audio.unlock();
});

$("freeSend").addEventListener("click", ()=>{
  const v = $("freeText").value.trim();
  if(!v || busy || dead) return;
  $("freeText").value = "";
  act(v);
});
$("freeText").addEventListener("keydown", e=>{
  if(e.key==="Enter"){ e.preventDefault(); $("freeSend").click(); }
});

$("retryBtn").addEventListener("click", ()=>{
  if(busy || lastPayload===null) return;
  errorBox.classList.add("hidden");
  $("backBtn").classList.add("hidden");
  callClaude(lastPayload);
});
$("backBtn").addEventListener("click", ()=>{
  errorBox.classList.add("hidden");
  $("backBtn").classList.add("hidden");
  gate.classList.remove("hidden");
  gate.scrollIntoView({behavior:"smooth"});
});

})();
</script>
</body>
